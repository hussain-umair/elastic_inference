prometheus:
  url: http://prometheus-kube-prometheus-prometheus.monitoring.svc
  port: 9090

rules:
  default: false
  custom:
    - seriesQuery: 'inference_processing_seconds_bucket{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: '^inference_processing_seconds_bucket$'
        as: 'inference_processing_seconds'
      metricsQuery: |
        histogram_quantile(
        0.99,
        sum(
          rate(inference_processing_seconds_bucket{<<.LabelMatchers>>}[1m])
        ) by (<<.GroupBy>>, le)
        )