apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: infer-app-svc-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - infer-app-ns
  selector:
    matchLabels:
      app: infer-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s