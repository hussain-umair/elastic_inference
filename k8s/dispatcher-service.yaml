apiVersion: v1
kind: Service
metadata:
  name: dispatcher-svc
  namespace: ml-inference-ns
  labels:
    app: dispatcher
spec:
  selector:
    app: dispatcher
  ports:
    - name: http
      port: 80
      targetPort: 8080
    
    - name: metrics
      port: 9100
      targetPort: 9100
  type: NodePort