apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-app-dp
  namespace: infer-app-ns
  labels:
    app: infer-app
    environment: dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: infer-app
  template:
    metadata:
      labels:
        app: infer-app
    
    spec:
      containers:
        - name: infer-cn
          image: infer-img:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
          args:
            - model_server.py
          workingDir: /app
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: "1"
              memory: "1.5Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          