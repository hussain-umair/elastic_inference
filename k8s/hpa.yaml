apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: infer-app-hpa
  namespace: infer-app-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: infer-app-dp

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70