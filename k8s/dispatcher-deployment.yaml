apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher-dp
  namespace: ml-inference-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
    spec:
      containers:
        - name: dispatcher-cn
          image: dispatcher-img
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9100